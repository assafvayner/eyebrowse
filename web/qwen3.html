<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>eyebrowse — Qwen3-0.6B in the browser (WebGPU)</title>
    <style>
      body { font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; margin: 2rem; }
      #log { white-space: pre-wrap; }
      .ok { color: #137333; }
      .err { color: #c5221f; }
    </style>
  </head>
  <body>
    <h1>Qwen3-0.6B generation (WebGPU)</h1>
    <div id="log">starting…</div>
    <script type="module">
      import init, { generate_ids } from './pkg/eyebrowse.js';

      const logEl = document.getElementById('log');
      const lines = [];
      function log(msg, cls) {
        lines.push(msg);
        logEl.textContent = lines.join('\n');
        if (cls) logEl.className = cls;
        console.log('[qwen3]', msg);
      }

      const t0 = performance.now();
      try {
        log('initializing wasm…');
        await init();
        log(`wasm ready (+${((performance.now() - t0) / 1000).toFixed(2)}s)`);

        log('fetching config.json…');
        const cfg = await (await fetch('/model/config.json')).text();
        log(`config.json loaded (${cfg.length} bytes)`);

        log('fetching model.safetensors (~1.4GB)…');
        const tFetch = performance.now();
        const wbuf = await (await fetch('/model/model.safetensors')).arrayBuffer();
        log(`weights loaded: ${(wbuf.byteLength / 1e6).toFixed(1)} MB (+${((performance.now() - tFetch) / 1000).toFixed(2)}s)`);

        const inputIds = new Uint32Array([785, 6722, 315, 9625, 374]);
        log(`generating: input_ids=[${Array.from(inputIds).join(',')}], max_new=20, max_seq=64…`);

        const tGen = performance.now();
        const out = await generate_ids(cfg, new Uint8Array(wbuf), inputIds, 20, 64);
        const genSecs = (performance.now() - tGen) / 1000;

        const result = Array.from(out);
        window.__RESULT__ = result;
        log(`done in ${genSecs.toFixed(2)}s → [${result.join(',')}]`, 'ok');
        log(`total elapsed ${((performance.now() - t0) / 1000).toFixed(2)}s`, 'ok');
      } catch (e) {
        window.__ERROR__ = String(e && e.stack ? e.stack : e);
        log('ERROR: ' + window.__ERROR__, 'err');
        console.error(e);
      }
    </script>
  </body>
</html>
