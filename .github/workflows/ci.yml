name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  validate:
    name: fmt · clippy · build · test (lavapipe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # rust-toolchain.toml pins the version + rustfmt/clippy components; rustup installs them.
      - name: Install pinned toolchain
        run: rustup show && rustc --version && cargo --version

      - uses: Swatinem/rust-cache@v2

      # The runtime needs a Vulkan device; lavapipe is Mesa's software (CPU) Vulkan driver, so the
      # GPU kernel/primitive tests run headless. The model-golden integration tests self-skip
      # because their multi-GB fixtures are not in CI.
      - name: Install Mesa lavapipe (software Vulkan)
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers libvulkan1 vulkan-tools
          echo "--- installed Vulkan ICDs ---"
          ls -la /usr/share/vulkan/icd.d/ || true
          echo "--- vulkaninfo ---"
          vulkaninfo --summary || true

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        # Let the Vulkan loader auto-discover the lavapipe ICD mesa installs (do NOT pin
        # VK_ICD_FILENAMES — that overrides discovery and breaks if the path differs).
        env:
          WGPU_BACKEND: vulkan
        run: cargo test --workspace
